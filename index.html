<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Redação ☕</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-input: #0f0f16;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-dark: #7c3aed;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #27273a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.08), transparent);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .logo-text {
            font-weight: 700; font-size: 1.25rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sub { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        .header-stats { display: flex; gap: 1rem; }

        .stat-badge {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.875rem;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        .hero { text-align: center; margin-bottom: 2.5rem; padding: 1rem 0; }

        .hero-tagline { font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }

        .hero-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.2; }

        .hero-title .highlight { background: linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .hero-subtitle { color: var(--text-secondary); font-size: 1rem; line-height: 1.6; max-width: 500px; margin: 0 auto; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }

        .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }

        .card-header-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        .form-group { margin-bottom: 1.25rem; }

        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; }

        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 0.875rem 1rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn {
            width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }

        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4); }

        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); margin-top: 0.75rem; }

        .main-content { display: none; }

        .main-content.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-bar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 1.5rem; }

        .user-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        .essays-list { display: flex; flex-direction: column; gap: 1rem; }

        .essay-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; transition: all 0.2s; }

        .essay-item:hover { border-color: var(--accent); transform: translateX(4px); }

        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 1rem; margin-top: 1rem; display: none; }

        .error-box.show { display: block; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(5px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }

        .loading-overlay.active { display: flex; }

        .loading-spinner { width: 60px; height: 60px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.5rem; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); border: 1px solid var(--border); padding: 1rem 1.5rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); opacity: 0; transition: all 0.3s; z-index: 1000; }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 640px) { .header-stats { display: none; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">☕</div>
            <div>
                <div class="logo-text">Coffee Redação</div>
                <div class="logo-sub">Sala do Futuro</div>
            </div>
        </div>
        <div class="header-stats" id="headerStats" style="display: none;">
            <div class="stat-badge"><span>📋</span><strong>0</strong></div>
        </div>
    </header>

    <div class="container" id="loginSection">
        <div class="hero">
            <p class="hero-tagline">mobile developer tool</p>
            <h1 class="hero-title">redação <span class="highlight">automática</span></h1>
            <p class="hero-subtitle">Busque e organize suas tarefas da Sala do Futuro.</p>
        </div>

        <div class="card">
            <div class="card-header"><div class="card-header-icon">🔐</div><h3>Acesso</h3></div>
            <div class="form-group">
                <label class="form-label">RA Aluno</label>
                <input type="text" id="username" placeholder="000111222333sp">
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" id="password" placeholder="Sua senha">
            </div>
            <div class="error-box" id="errorBox">
                <h4 style="color: var(--danger);">❌ Erro</h4>
                <p id="errorMessage" style="font-size: 0.8rem; color: var(--text-secondary);"></p>
            </div>
        </div>

        <div class="card">
            <button class="btn" onclick="login()" id="loginBtn">🔍 Buscar Redações</button>
            <button class="btn btn-secondary" onclick="saveAccount()">💾 Salvar RA</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="user-bar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div><h4 id="userName">Aluno</h4><p id="userClass" style="font-size: 0.8rem; color: var(--text-muted);">Turma</p></div>
                </div>
                <button onclick="location.reload()" style="background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 0.5rem; border-radius: 8px; cursor: pointer;">Sair</button>
            </div>
            <div class="essays-list" id="essaysList"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p id="loadingSubtext">Conectando...</p>
    </div>

    <div class="toast" id="toast">Mensagem</div>

    <script>
        const API_CONFIG = {
            baseURL: 'https://proxycoffe.temporavel2.workers.dev/saladofuturobffapi',
            eduspURL: 'https://proxycoffe.temporavel2.workers.dev',
            endpoints: {
                login: '/credenciais/api/LoginCompletoToken',
                aluno: '/alunoapi/api/Aluno/ExibirAluno',
                eduspToken: '/registration/edusp/token',
                tasks: '/tms/task/todo'
            }
        };

        let authToken = null;
        let userData = null;

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return showToast('Preencha os campos', 'error');

            document.getElementById('errorBox').classList.remove('show');
            document.getElementById('loadingOverlay').classList.add('active');

            try {
                document.getElementById('loadingSubtext').textContent = "Autenticando...";
                
                const loginRes = await fetch(`${API_CONFIG.baseURL}${API_CONFIG.endpoints.login}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                // LER COMO TEXTO PRIMEIRO PARA EVITAR ERRO DE JSON VAZIO
                const rawResponse = await loginRes.text();
                
                if (!rawResponse || rawResponse.trim() === "") {
                    throw new Error("O servidor do governo enviou uma resposta vazia. Verifique seu RA e Senha.");
                }

                let loginData;
                try {
                    loginData = JSON.parse(rawResponse);
                } catch(e) {
                    throw new Error("Resposta inválida do servidor. Tente novamente mais tarde.");
                }

                if (!loginRes.ok) {
                    throw new Error(loginData.mensagem || loginData.error || "Erro nas credenciais.");
                }

                authToken = loginData.token || loginData.accessToken;
                userData = loginData;

                document.getElementById('loadingSubtext').textContent = "Buscando redações...";
                await loadEssays();

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                updateUI();

            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('errorBox').classList.add('show');
            } finally {
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        async function loadEssays() {
            try {
                const res = await fetch(`${API_CONFIG.eduspURL}${API_CONFIG.endpoints.tasks}?limit=50&is_essay=true`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await res.json();
                const container = document.getElementById('essaysList');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nenhuma redação pendente!</p>';
                    return;
                }

                container.innerHTML = data.map(task => `
                    <div class="essay-item">
                        <h4>${task.title || 'Redação'}</h4>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin: 0.5rem 0;">${task.description || 'Sem descrição'}</p>
                        <a href="${task.url || '#'}" target="_blank" class="btn" style="padding: 0.5rem; font-size: 0.8rem; margin-top: 0.5rem;">Escrever</a>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        function updateUI() {
            const name = userData?.nome || "Aluno";
            document.getElementById('userName').textContent = name;
            document.getElementById('userAvatar').textContent = name[0].toUpperCase();
            document.getElementById('userClass').textContent = userData?.turma || "Sala do Futuro";
        }

        function saveAccount() {
            localStorage.setItem('savedRA', document.getElementById('username').value);
            showToast('RA salvo!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('savedRA');
            if (saved) document.getElementById('username').value = saved;
        };
    </script>
</body>
</html>
